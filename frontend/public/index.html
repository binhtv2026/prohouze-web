        <noscript>You need to enable JavaScript to run this app.</noscript>
        <!-- DEBUG: Catch pre-React JS errors (remove after fix) -->
        <script>
          window.__debug_errors = [];
          window.onerror = function(msg, src, line, col, err) {
            window.__debug_errors.push({msg, src, line, col, stack: err && err.stack});
            var d = document.getElementById('root');
            if (d) {
              d.style.cssText = 'font-family:monospace;padding:24px;color:#b00;background:#fff;min-height:100vh';
              d.innerHTML = '<h2>&#9888; JS Init Error (window.onerror)</h2>'
                + '<p style="color:#666">Lỗi xảy ra trước khi React khởi động</p>'
                + '<pre style="background:#fef2f2;padding:12px;border-radius:6px;overflow-x:auto">' + msg + '\n\n' + src + ':' + line + ':' + col + '\n\n' + (err && err.stack ? err.stack : '') + '</pre>';
            }
            return true;
          };
          window.addEventListener('unhandledrejection', function(evt) {
            window.__debug_errors.push({type:'promise', reason: String(evt.reason)});
            var d = document.getElementById('root');
            if (d && d.innerHTML.trim() === '') {
              d.style.cssText = 'font-family:monospace;padding:24px;color:#b00;background:#fff;min-height:100vh';
              d.innerHTML = '<h2>&#9888; Promise Error</h2><pre style="background:#fff7ed;padding:12px;border-radius:6px">' + String(evt.reason) + '\n' + (evt.reason && evt.reason.stack ? evt.reason.stack : '') + '</pre>';
            }
          });
        </script>
        <div id="root"></div>
